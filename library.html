            <!--
                DOWNLOAD LINKS
                The "download" attribute on an <a> tag tells the browser to
                download the file instead of navigating to it.

                Without "download": clicking opens the PDF in the browser.
                With "download": clicking saves the file to the user's computer.

                TO ADD A NEW DOWNLOAD:
                <li><a href="filename.pdf" download>Display Name</a></li>

                The file (e.g. filename.pdf) must be in the same folder as this HTML file,
                or you need to include the path (e.g. href="docs/filename.pdf").

                INLINE STYLES:
                style="..." on an element overrides CSS for just that element.
                Here we remove bullet points and set line-height for spacing.
            -->
            <ul style="list-style: none; padding: 0; margin: 20px 0; line-height: 2.2;">
                <li><a href="basic-principles-of-design.pdf" download>Basic Principles of Design</a></li>
                <li><a href="pdfcoffee.com-king-warrior-magician-lover-by-robert-moore.pdf" download>King, Warrior, Magician, Lover — Robert Moore</a></li>
                <li><a href="personal-data-removal-workbook.pdf" download>Personal Data Removal Workbook (5th Ed.)</a></li>
            </ul>
