version: '3.8'

services:

  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: always
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql

  flarum:
    image: crazymax/flarum:latest
    restart: always
    ports:
      - "8001:8000"
    depends_on: [mysql]
    environment:
      DB_HOST: mysql
      DB_NAME: flarum
      DB_USER: flarum
      DB_PASSWORD: ${FLARUM_DB_PASS}
      FLARUM_BASE_URL: https://forum.sebastian-fisher.com
    volumes:
      - ./flarum:/data

  ghost:
    image: ghost:5-alpine
    restart: always
    ports:
      - "8002:2368"
    depends_on: [mysql]
    environment:
      database__client: mysql
      database__connection__host: mysql
      database__connection__database: ghost
      database__connection__user: ghost
      database__connection__password: ${GHOST_DB_PASS}
      url: http://blog.sebastian-fisher.com
      NODE_ENV: production
    volumes:
      - ./ghost:/var/lib/ghost/content

  influxdb:
    image: influxdb:2.7
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASS}
      DOCKER_INFLUXDB_INIT_ORG: seb
      DOCKER_INFLUXDB_INIT_BUCKET: training
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - ./influxdb:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "8003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./grafana:/var/lib/grafana

  umami:
    image: ghcr.io/umami-software/umami:mysql-latest
    restart: always
    ports:
      - "8004:3000"
    depends_on: [mysql]
    environment:
      DATABASE_URL: mysql://umami:${UMAMI_DB_PASS}@mysql:3306/umami
      APP_SECRET: ${UMAMI_SECRET}

  calcom:
    image: calcom/cal.com:latest
    restart: always
    ports:
      - "8005:3000"
    depends_on: [mysql]
    environment:
      DATABASE_URL: mysql://calcom:${CALCOM_DB_PASS}@mysql:3306/calcom
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://cal.sebastian-fisher.com
      NEXT_PUBLIC_WEBAPP_URL: https://cal.sebastian-fisher.com
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPT_KEY}

  yourls:
    image: yourls:latest
    restart: always
    ports:
      - "8006:80"
    depends_on: [mysql]
    environment:
      YOURLS_DB_HOST: mysql
      YOURLS_DB_NAME: yourls
      YOURLS_DB_USER: yourls
      YOURLS_DB_PASS: ${YOURLS_DB_PASS}
      YOURLS_SITE: https://s.sebastian-fisher.com
      YOURLS_USER: admin
      YOURLS_PASS: ${YOURLS_ADMIN_PASS}
    volumes:
      - ./yourls:/var/www/html/user

  codeserver:
    image: lscr.io/linuxserver/code-server:latest
    restart: always
    ports:
      - "8007:8443"
    environment:
      PUID: 1000
      PGID: 1000
      PASSWORD: ${CODESERVER_PASS}
      DEFAULT_WORKSPACE: /home/coder
    volumes:
      - ./code-server-config:/config
      - /home/sebastian:/home/coder

  staticsite:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - /home/sebastian/site:/usr/share/nginx/html:ro
      - ./nginx-static.conf:/etc/nginx/conf.d/default.conf:ro

  manage:
    image: nginx:alpine
    restart: always
    ports:
      - "8008:80"
    volumes:
      - ./manage-portal:/usr/share/nginx/html:ro
      - ./manage-portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  formcapture:
    build: ./formcapture
    restart: always
    ports:
      - "8009:3000"
    environment:
      FORMS_ADMIN_TOKEN: ${FORMS_ADMIN_TOKEN}
    volumes:
      - ./formcapture/data:/app/data

  listmonk-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: ${LISTMONK_DB_PASS}
      POSTGRES_DB: listmonk
    volumes:
      - ./listmonk-db:/var/lib/postgresql/data

  listmonk:
    image: listmonk/listmonk:latest
    restart: always
    ports:
      - "8010:9000"
    depends_on: [listmonk-db]
    command: sh -c "./listmonk --install --idempotent --yes && ./listmonk"
    environment:
      LISTMONK_db__host: listmonk-db
      LISTMONK_db__port: 5432
      LISTMONK_db__user: listmonk
      LISTMONK_db__password: ${LISTMONK_DB_PASS}
      LISTMONK_db__database: listmonk
    volumes:
      - ./listmonk/config.toml:/listmonk/config.toml

  easyapp:
    image: alextselegidis/easyappointments:latest
    restart: unless-stopped
    ports:
      - "8011:80"
    depends_on: [mysql]
    environment:
      BASE_URL: https://book.sebastian-fisher.com
      DB_HOST: mysql
      DB_NAME: easyapp
      DB_USERNAME: easyapp
      DB_PASSWORD: ${EASYAPP_DB_PASS}
    volumes:
      - ./easyapp:/var/www/html/storage

  wger:
    image: wger/server:latest
    restart: unless-stopped
    ports:
      - "8012:8000"
    environment:
      TIME_ZONE: Europe/London
      DJANGO_SETTINGS_MODULE: settings.main
      SECRET_KEY: ${WGER_SECRET}
      DJANGO_PERFORM_MIGRATIONS: "True"
      DJANGO_CLEAR_STATIC_FIRST: "False"
      SITE_URL: https://tracker.sebastian-fisher.com
    volumes:
      - ./wger:/home/wger/static
