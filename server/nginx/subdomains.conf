# Analytics — analytics.sebastian-fisher.com
# Proxies to Umami running in Docker on port 3000

server {
    listen 80;
    server_name analytics.sebastian-fisher.com;
    return 301 https://analytics.sebastian-fisher.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name analytics.sebastian-fisher.com;

    ssl_certificate     /etc/letsencrypt/live/sebastian-fisher.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sebastian-fisher.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}


