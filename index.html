<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBASTIAN FISHER</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>

@font-face {
    font-family: 'pixel basiic';
    src: url('/fonts/basiic.ttf') format('truetype');
    font-display: swap;
}
@font-face {
    font-family: 'Chicago';
    src: url('/fonts/Chicago-Normal.ttf') format('truetype');
    font-display: swap;
}

#loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity .5s ease;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }
#loading-screen .ld-logo {
    font-family: 'pixel basiic', 'Chicago', monospace;
    font-size: 36px; color: #7ec8e3; letter-spacing: 4px;
    text-shadow: 0 0 20px #7ec8e3, 0 0 40px #3a90c8;
    margin-bottom: 16px;
}
#loading-screen .ld-sub {
    font-family: 'pixel basiic', 'Chicago', monospace;
    font-size: 13px; color: #5599bb; letter-spacing: 2px;
    margin-bottom: 32px;
}
#loading-screen img.ld-gif {
    width: 80px; height: auto; image-rendering: pixelated;
    margin-bottom: 28px;
}
#loading-screen .ld-bar-wrap {
    width: 240px; height: 16px;
    border: 1px solid #3a6688;
    background: #0a1a2a;
    position: relative; overflow: hidden;
}
#loading-screen .ld-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #1a6aaa, #7ec8e3);
    transition: width .3s linear;
}
#loading-screen .ld-status {
    font-size: 10px; color: #5599bb; margin-top: 8px;
    font-family: 'Courier New', monospace; letter-spacing: 1px;
}
        body {
            color: #008cff;
            font-family: "Courier New", Courier, monospace;
            background-color: black;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .starbg {
            width: 100%; height: 100%;
            background-repeat: repeat;
            position: fixed; top: 0; left: 0;
            background-image: url("media/backgrounds/stripes.png");
            animation: backgroundScroll 5s linear infinite;
            mix-blend-mode: screen;
            z-index: -1;
        }

        @keyframes backgroundScroll {
            0%   { background-position: 0px 0px; }
            100% { background-position: 100px 100px; }
        }

        .characterbg {
            width: 100%; height: 100%;
            position: fixed; top: 0; left: 0;
            background-image: url("media/backgrounds/landing.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            mix-blend-mode: screen;
            z-index: -2;
        }

        .center-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; min-height: 100vh;
        }

        .card {
            background-color: rgba(0, 0, 0, 0.9);
            border: 1px solid #ff00aa;
            padding: 50px;
            box-shadow: 0px 0px 30px 1px #ff00aa;
            width: 510px;
        }

        .logo { margin-bottom: 25px; }

        h2 a {
            color: #ff00aa;
            text-decoration: none;
            font-weight: normal;
        }

        h2 a:hover { color: white; }
    </style>
</head>
<body>
    <div class="characterbg"></div>
    <div class="starbg"></div>

    <div class="center-screen">
        <div class="card">
            <img src="Welcometo-Welcometo.png" style="max-width: 100%; display: block; margin: 0 auto 10px;">
            <h1 style="color: #ff00aa; font-family: 'Courier New', monospace; font-size: 1.6em; margin: 0 0 30px; text-shadow: 0 0 10px #ff00aa;">SEBASTIAN-FISHER.COM</h1>
            <h2 style="margin: 0;"><a id="enter-btn" href="home.html" style="text-decoration: none;">&#10038;&#10097;&#10097; ENTER &#10096;&#10096;&#10038;</a></h2>
        </div>
    </div>

<script>
// music + honk on index
(function(){
    var ROOT = '/media/audio/music/';
    var bg = null, started = false;

    function startBg() {
        if (started) return;
        started = true;
        bg = new Audio(ROOT + 'your-song-melon.mp3');
        bg.volume = 0.3;
        bg.loop = true;
        bg.play().catch(function(){});
    }

    document.addEventListener('click', function(){ startBg(); }, {once:true});

    var enterBtn = document.getElementById('enter-btn');
    if (enterBtn) {
        enterBtn.addEventListener('click', function(){
            var h = new Audio(ROOT + 'honk.mp3');
            h.volume = 0.7;
            h.play().catch(function(){});
        });
    }
})();
</script>

<script>
(function () {
    'use strict';

    const STEPS = [
        'Initialising kernel…',
        'Loading modules…',
        'Mounting volumes…',
        'Starting services…',
        'Applying themes…',
        'Almost there…',
        'Welcome.',
    ];

    function buildLoadingScreen() {
        const div = document.createElement('div');
        div.id = 'loading-screen';
        div.innerHTML = `
            <img class="ld-gif" src="media/monitor-screen-0002.gif" alt="">
            <div class="ld-logo">SEBASTIAN FISHER</div>
            <div class="ld-sub">SERVER LOADING</div>
            <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
            <div class="ld-status" id="ld-status">${STEPS[0]}</div>
        `;
        document.body.prepend(div);
        return div;
    }

    function runLoadingScreen(onDone) {
        const screen = buildLoadingScreen();
        const bar    = document.getElementById('ld-bar');
        const status = document.getElementById('ld-status');
        let step = 0;
        let done = false;

        const iv = setInterval(() => {
            step++;
            bar.style.width = Math.round((step / STEPS.length) * 100) + '%';
            status.textContent = STEPS[Math.min(step, STEPS.length - 1)];
            if (step >= STEPS.length) {
                clearInterval(iv);
                setTimeout(() => {
                    screen.classList.add('fade-out');
                    setTimeout(() => {
                        screen.remove();
                        if (!done) { done = true; onDone(); }
                    }, 600);
                }, 300);
            }
        }, 260);
    }

    runLoadingScreen(() => {});
})();
</script>

</body>
</html>
