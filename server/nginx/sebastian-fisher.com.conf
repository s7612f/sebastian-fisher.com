# Main site — sebastian-fisher.com
# Serves the static HTML repo from /var/www/sebastian-fisher.com

server {
    listen 80;
    server_name sebastian-fisher.com www.sebastian-fisher.com;
    return 301 https://sebastian-fisher.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.sebastian-fisher.com;
    ssl_certificate     /etc/letsencrypt/live/sebastian-fisher.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sebastian-fisher.com/privkey.pem;
    return 301 https://sebastian-fisher.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sebastian-fisher.com;

    ssl_certificate     /etc/letsencrypt/live/sebastian-fisher.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sebastian-fisher.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/sebastian-fisher.com;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;

    # Static files — long cache
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|woff2|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
}
