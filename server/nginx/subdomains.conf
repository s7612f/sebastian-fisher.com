# Blog — blog.sebastian-fisher.com
# Served from the same repo (static HTML at /blog/)

server {
    listen 80;
    server_name blog.sebastian-fisher.com;
    return 301 https://blog.sebastian-fisher.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.sebastian-fisher.com;

    ssl_certificate     /etc/letsencrypt/live/sebastian-fisher.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sebastian-fisher.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/sebastian-fisher.com/blog;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}


