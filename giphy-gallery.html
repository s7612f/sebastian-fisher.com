<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.35">
    <title>Giphy Gallery - Sebastian Fisher</title>
    <style>
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #352d32;
            background-image: url("assets/giphy/images/bg.gif");
            font-family: 'Times New Roman', serif;
        }

        #shade {
            background-color: #12bb84;
            opacity: 0.15;
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #wrapper {
            display: flex;
            height: 100%;
            width: 100%;
            padding: 40px 20px 20px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        #mainframe-outer {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 3px double #0000a6;
            border-radius: 15px;
            background-color: #1e1649;
            box-shadow: 10px 10px 60px -5px rgba(11, 67, 223, 0.54);
            overflow: hidden;
            position: relative;
        }

        #mainframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .ui-element {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
        }

        #logo {
            top: 10px;
            left: 20px;
            z-index: 30;
        }

        #logo img {
            width: 80px;
            image-rendering: pixelated;
        }

        #home-link {
            top: 10px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid white;
            font-weight: bold;
        }

        #home-link:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Sound Effect Controls */
        #audio-controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 100;
        }

        .audio-btn {
            background: rgba(0,0,0,0.7);
            color: #ffee00;
            border: 2px outset #444;
            padding: 5px;
            cursor: pointer;
            font-size: 12px;
        }

    </style>
</head>
<body>

    <div id="shade"></div>

    <div id="wrapper">
        <div id="mainframe-outer">
            <iframe id="mainframe" src="https://giphy.neocities.org"></iframe>
        </div>
    </div>

    <div id="ui-layer">
        <a id="logo" class="ui-element" href="index.html">
            <img src="assets/giphy/images/earth.gif" alt="Home">
        </a>
        <a id="home-link" class="ui-element" href="index.html">Back to Main Site</a>
    </div>

    <!-- Audio Elements -->
    <audio id="click-audio">
        <source src="assets/giphy/audio/ui/click.mp3" type="audio/mpeg">
    </audio>
    <audio id="interact-audio">
        <source src="assets/giphy/audio/ui/drip.mp3" type="audio/mpeg">
    </audio>
    <audio id="background-audio" loop>
        <source src="assets/giphy/audio/background.mp3" type="audio/mpeg">
    </audio>
    <audio id="door-audio">
        <source src="assets/giphy/audio/ui/door.mp3" type="audio/mpeg">
    </audio>

    <audio id="squeek-audio">
        <source src="assets/giphy/audio/ui/squeek.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Audio System
        const audio = {
            click: document.getElementById('click-audio'),
            interact: document.getElementById('interact-audio'),
            background: document.getElementById('background-audio'),
            door: document.getElementById('door-audio'),
            squeek: document.getElementById('squeek-audio')
        };

        // Initialize background audio on first interaction (browser requirement)
        let audioInitialized = false;
        function initAudio() {
            if (!audioInitialized) {
                audio.background.volume = 0.4;
                audio.background.play().catch(e => console.log("Audio play blocked", e));
                audioInitialized = true;
            }
        }

        document.addEventListener('mouseover', (e) => {
            if (e.target.tagName === 'A' || e.target.classList.contains('ui-element') || e.target.closest('.ui-element')) {
                audio.interact.currentTime = 0;
                audio.interact.play().catch(() => {});
            }
        });

        document.addEventListener('click', (e) => {
            initAudio();
            if (e.target.tagName === 'A' || e.target.closest('a') || e.target.classList.contains('ui-element')) {
                audio.click.currentTime = 0;
                audio.click.play().catch(() => {});
            }
        });

        // Draggable Logo with Squeek
        const logo = document.getElementById('logo');
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        logo.addEventListener('mousedown', (e) => {
            isDragging = true;
            offset.x = e.clientX - logo.offsetLeft;
            offset.y = e.clientY - logo.offsetTop;
            audio.squeek.loop = true;
            audio.squeek.play().catch(() => {});
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                logo.style.left = (e.clientX - offset.x) + 'px';
                logo.style.top = (e.clientY - offset.y) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                audio.squeek.pause();
                audio.squeek.currentTime = 0;
            }
        });

        // Background rotation (optional fun feature)
        const backgrounds = [
            "assets/giphy/images/bg.gif"
            // Add more if desired
        ];

        function changeBg() {
            // Simplified for now
            document.body.style.backgroundImage = `url("${backgrounds[0]}")`;
        }

        window.addEventListener('load', () => {
            // Add a slight delay for the door sound effect
            setTimeout(() => {
                audio.door.play().catch(() => {});
            }, 500);
        });
    </script>
</body>
</html>
