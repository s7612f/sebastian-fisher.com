<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebastian Fisher — coming soon.">
  <meta name="robots" content="noindex, nofollow">
  <title>SEBASTIAN FISHER :: COMING SOON</title>
  <style>
    :root {
      --bg: #0d0f12;
      --bg2: #14181d;
      --fg: #d4d8dc;
      --fg-dim: #7b838c;
      --accent: #c84b4b;
      --border: #2a2f36;
      --font: "Courier New", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      min-height: 100vh;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--border);
      background: var(--bg2);
      padding: 28px 24px;
      text-align: center;
    }
    .tag {
      color: var(--fg-dim);
      font-size: 0.72em;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.15em;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .sub {
      color: var(--fg-dim);
      font-size: 0.82em;
      letter-spacing: 1px;
      margin-bottom: 22px;
    }
    pre {
      color: var(--fg-dim);
      font-size: 0.72em;
      line-height: 1.45;
      text-align: left;
      display: inline-block;
      margin: 0 0 22px;
    }
    .bar {
      height: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      margin: 0 0 22px;
      position: relative;
      overflow: hidden;
    }
    .bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        var(--accent) 0 8px,
        transparent 8px 16px
      );
      opacity: 0.55;
    }
    a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px dotted var(--fg-dim);
    }
    a:hover { color: var(--accent); border-color: var(--accent); }
    footer {
      margin-top: 18px;
      font-size: 0.7em;
      color: var(--fg-dim);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">// SEBASTIAN-FISHER.COM</div>
    <h1>COMING SOON</h1>
    <div class="sub">SITE UNDER CONSTRUCTION</div>

<pre>
  +------------------------------+
  |  STATUS : BUILDING...        |
  |  ETA    : SOON               |
  +------------------------------+
</pre>

    <div class="bar"></div>

    <div class="sub">
      For enquiries:<br>
      <a href="mailto:contact@sebastian-fisher.com">contact@sebastian-fisher.com</a>
    </div>

    <footer>&copy; SEBASTIAN FISHER</footer>
  </main>
</body>
</html>
